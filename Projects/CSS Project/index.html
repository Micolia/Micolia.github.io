<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Plants Shop</title>
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" type="image/png" href="assets/img/plant.png">
</head>

<body>

    <header>
            <div class="header-text">
                <h1>Welcome</h1>
                <p>to My Plants Online Shop!</p>
            </div>
    </header><br><br>

    <div class="content">
        <h2>Classy Plants</h2>
        <div class="product">
            <img src="assets/img/pp3.jpg" alt="img classy plants" class="product-image">
            <div class="product-details">
                <p>Price:</p>
                <p>39,99 €</p>
            </div>
        </div>
    </div>

    <div class="content">
        <h2>Fresh Plants</h2>
        <div class="product">
            <img src="assets/img/pp1.jpg" alt="img fresh plants" class="product-image">
            <div class="product-details">
                <p>Price:</p>
                <p>8,99 €</p>
            </div>
        </div>
    </div>

    <div class="content">
        <h2>Tropical Plants</h2>
        <div class="product">
            <img src="assets/img/pp2.jpg" alt="img tropical plants" class="product-image">
            <div class="product-details">
                <p>Price:</p>
                <p>10,99 €</p>
            </div>
        </div>
    </div>

<footer>
<div class="footer">
<p class="footer-text">Follow us on Instagram: @myplantsshop</p>

</div>

</footer>

</html>
